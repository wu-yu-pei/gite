services:
  app:
    image: node:20-alpine3.21
    working_dir: /app
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=root123
      - MYSQL_DATABASE=wei_gif
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - WX_APPID=wxfd9e4d0f7ffcdbf4
      - WX_SECRET=103b94e182af8b3f63384737da2fdbe4
      - JWT_SECRET=asdnl156Decv
      - JWT_EXPIRES_IN=100d
      - TZ=Asia/Shanghai
    command: sh -c "npm install && npx nodemon src/server.js"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root123
      - MYSQL_DATABASE=wei_gif
      - TZ=Asia/Shanghai
    command: --default-time-zone='+08:00'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./src/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

volumes:
  app_node_modules:
  mysql_data:
  redis_data:

networks:
  backend:
    driver: bridge
